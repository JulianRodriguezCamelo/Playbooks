    - name: "4.1.1 Ensure nftables is installed (Automated)"
      block:
        - name: "4.1.1 | Install nftables package"
          ansible.builtin.dnf:
            name: nftables
            state: present

    - name: "4.1.2 Ensure a single firewall configuration utility is in use (Automated)"
      block:
        - name: "4.1.2 | Check firewall status and ensure only one is active"
          ansible.builtin.shell: |
            l_fwd_status=""
            l_nft_status=""
            rpm -q firewalld > /dev/null 2>&1 && l_fwd_status="$(systemctl is-enabled firewalld.service):$(systemctl is-active firewalld.service)"
            rpm -q nftables > /dev/null 2>&1 && l_nft_status="$(systemctl is-enabled nftables.service):$(systemctl is-active nftables.service)"
            l_fwutil_status="$l_fwd_status:$l_nft_status"
            case $l_fwutil_status in
              enabled:active:enabled:active)
                systemctl stop nftables && systemctl --now mask nftables ;;
              *:active:*:active)
                if [ "$(echo $l_fwutil_status | cut -d: -f1)" = "enabled" ]; then
                  systemctl stop nftables && systemctl --now mask nftables
                else
                  systemctl stop firewalld && systemctl --now mask firewalld
                fi ;;
              :)
                dnf -q install nftables ;;
              *:*:)
                dnf -q install nftables ;;
            esac
          changed_when: false
          failed_when: false

    - name: "4.2.1 Ensure firewalld drops unnecessary services and ports (Manual)"
      block:
        - name: "4.2.1 | MANUAL - Review firewalld services and ports"
          ansible.builtin.debug:
            msg: >
              MANUAL CHECK REQUIRED: Review active firewalld zone services and ports.
              Run: firewall-cmd --list-all --zone=$(firewall-cmd --list-all | awk '/\(active\)/ { print $1 }')
              Remove unnecessary services with: firewall-cmd --remove-service=<service>
              Remove unnecessary ports with: firewall-cmd --remove-port=<port>/<proto>
              Save changes with: firewall-cmd --runtime-to-permanent

    - name: "4.2.2 Ensure firewalld loopback traffic is configured (Automated)"
      block:
        - name: "4.2.2 | Configure loopback interface in firewalld trusted zone"
          ansible.builtin.command: firewall-cmd --permanent --zone=trusted --add-interface=lo
          changed_when: false
          failed_when: false
        - name: "4.2.2 | Add firewalld rich rule to drop IPv4 loopback spoofed traffic"
          ansible.builtin.command: >
            firewall-cmd --permanent --add-rich-rule='rule family=ipv4 source address="127.0.0.1" destination not address="127.0.0.1" drop'
          changed_when: false
          failed_when: false
        - name: "4.2.2 | Add firewalld rich rule to drop IPv6 loopback spoofed traffic"
          ansible.builtin.command: >
            firewall-cmd --permanent --add-rich-rule='rule family=ipv6 source address="::1" destination not address="::1" drop'
          changed_when: false
          failed_when: false
        - name: "4.2.2 | Reload firewalld to apply rules"
          ansible.builtin.command: firewall-cmd --reload
          changed_when: false
          failed_when: false

    - name: "4.3.1 Ensure nftables base chains exist (Automated)"
      block:
        - name: "4.3.1 | Create nftables inet filter table and base chains"
          ansible.builtin.command: "{{ item }}"
          loop:
            - "nft create table inet filter"
            - "nft create chain inet filter input { type filter hook input priority 0 \\; }"
            - "nft create chain inet filter forward { type filter hook forward priority 0 \\; }"
            - "nft create chain inet filter output { type filter hook output priority 0 \\; }"
          changed_when: false
          failed_when: false

    - name: "4.3.2 Ensure nftables established connections are configured (Manual)"
      block:
        - name: "4.3.2 | Allow established connections in nftables input chain"
          ansible.builtin.command: "{{ item }}"
          loop:
            - "nft add rule inet filter input ip protocol tcp ct state established accept"
            - "nft add rule inet filter input ip protocol udp ct state established accept"
            - "nft add rule inet filter input ip protocol icmp ct state established accept"
          changed_when: false
          failed_when: false

    - name: "4.3.3 Ensure nftables default deny firewall policy (Automated)"
      block:
        - name: "4.3.3 | Set default DROP policy on nftables input and forward chains"
          ansible.builtin.command: "{{ item }}"
          loop:
            - "nft chain inet filter input { policy drop \\; }"
            - "nft chain inet filter forward { policy drop \\; }"
          changed_when: false
          failed_when: false

    - name: "4.3.4 Ensure nftables loopback traffic is configured (Automated)"
      block:
        - name: "4.3.4 | Allow loopback traffic in nftables"
          ansible.builtin.command: nft add rule inet filter input iif lo accept
          changed_when: false
          failed_when: false
        - name: "4.3.4 | Drop IPv4 spoofed loopback traffic in nftables"
          ansible.builtin.command: nft add rule inet filter input ip saddr 127.0.0.0/8 counter drop
          changed_when: false
          failed_when: false
        - name: "4.3.4 | Drop IPv6 spoofed loopback traffic in nftables"
          ansible.builtin.command: nft add rule inet filter input ip6 saddr ::1 counter drop
          changed_when: false
          failed_when: false

