    - name: "1.1.2.7.2 Ensure nodev option set on /var/log/audit partition (Automated)"
      block:
        - name: "1.1.2.7.2 | Ensure nodev is set on /var/log/audit in /etc/fstab"
          ansible.builtin.replace:
            path: /etc/fstab
