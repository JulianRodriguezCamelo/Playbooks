    - name: "3.1.2 Ensure wireless interfaces are disabled (Automated)"
      block:
        - name: "3.1.2 | Disable wireless interfaces via nmcli"
          ansible.builtin.shell: |
            for iface in $(nmcli --fields UUID,TYPE con show | awk '/wifi/{print $1}'); do
              nmcli con down "$iface" 2>/dev/null
              nmcli con modify "$iface" connection.autoconnect no 2>/dev/null
            done
          changed_when: false
          failed_when: false
        - name: "3.1.2 | Disable wireless kernel modules"
          ansible.builtin.shell: |
            for driverdir in $(find /sys/class/net/*/ -type d -name wireless 2>/dev/null | xargs -0 dirname 2>/dev/null); do
              l_mname=$(basename "$(readlink -f "$driverdir/device/driver/module")")
              if ! modprobe -n -v "$l_mname" | grep -qP '^\h*install /bin/(true|false)'; then
                printf '%s\n' "install $l_mname /bin/false" >> /etc/modprobe.d/"$l_mname".conf
              fi
              modprobe -r "$l_mname" 2>/dev/null
              if ! grep -qP "^\h*blacklist\h+$l_mname\b" /etc/modprobe.d/* 2>/dev/null; then
                printf '%s\n' "blacklist $l_mname" >> /etc/modprobe.d/"$l_mname".conf
              fi
            done
          changed_when: false
          failed_when: false

