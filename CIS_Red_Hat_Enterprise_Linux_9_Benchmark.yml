        - name: "1.1.1.5 | Unload jffs2"
          community.general.modprobe:
            name: jffs2
            state: absent

    - name: "1.1.1.6 Ensure squashfs kernel module is not available (Automated)"
      block:
        - name: "1.1.1.6 | Disable squashfs"
          ansible.builtin.copy:
            dest: /etc/modprobe.d/squashfs.conf
            content: |
              install squashfs /bin/false
              blacklist squashfs
            owner: root
            group: root
            mode: "0644"
        - name: "1.1.1.6 | Unload squashfs"
          community.general.modprobe:
            name: squashfs
            state: absent

    - name: "1.1.1.7 Ensure udf kernel module is not available (Automated)"
      block:
        - name: "1.1.1.7 | Disable udf"
          ansible.builtin.copy:
            dest: /etc/modprobe.d/udf.conf
            content: |
              install udf /bin/false
              blacklist udf
            owner: root
            group: root
            mode: "0644"
        - name: "1.1.1.7 | Unload udf"
          community.general.modprobe:
            name: udf
            state: absent

    - name: "1.1.1.8 Ensure usb-storage kernel module is not available (Automated)"
      block:
        - name: "1.1.1.8 | Disable usb-storage"
          ansible.builtin.copy:
            dest: /etc/modprobe.d/usb-storage.conf
            content: |
              install usb_storage /bin/false
              blacklist usb_storage
            owner: root
            group: root
            mode: "0644"
        - name: "1.1.1.8 | Unload usb-storage"
          community.general.modprobe:
            name: usb-storage
            state: absent

    - name: "1.1.1.9 Ensure unused filesystems kernel modules are not available (Manual)"
      block:
        - name: "1.1.1.9 | Disable unused filesystem modules with known CVEs"
          ansible.builtin.copy:
            dest: "/etc/modprobe.d/{{ item }}.conf"
            content: |
              install {{ item }} /bin/false
              blacklist {{ item }}
            owner: root
            group: root
            mode: "0644"
          loop:
            - afs
            - ceph
            - cifs
            - exfat
            - fscache
            - fuse
            - gfs2
            - nfsd
        - name: "1.1.1.9 | Unload unused filesystem modules with known CVEs"
          community.general.modprobe:
            name: "{{ item }}"
            state: absent
          loop:
            - afs
            - ceph
            - cifs
            - exfat
            - fscache
            - fuse
            - gfs2
            - nfsd
          ignore_errors: true

    - name: "1.1.2.1.1 Ensure /tmp is a separate partition (Automated)"
      block:
        - name: "1.1.2.1.1 | Unmask tmp.mount systemd unit"
          ansible.builtin.systemd:
            name: tmp.mount
            masked: false
        - name: "1.1.2.1.1 | Ensure /tmp entry exists in /etc/fstab (tmpfs)"
          ansible.builtin.lineinfile:
            path: /etc/fstab
            regexp: '^\s*tmpfs\s+/tmp\s+'
            line: "tmpfs /tmp tmpfs defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0"
            state: present
        - name: "1.1.2.1.1 | Enable and start tmp.mount"
          ansible.builtin.systemd:
            name: tmp.mount
            enabled: true
            state: started

    - name: "1.1.2.1.2 Ensure nodev option set on /tmp partition (Automated)"
      block:
        - name: "1.1.2.1.2 | Ensure nodev is set on /tmp in /etc/fstab"
          ansible.builtin.replace:
            path: /etc/fstab
            regexp: '^(\s*\S+\s+/tmp\s+\S+\s+)(\S+)(\s+.*)$'
            replace: '\1\2\3'
        - name: "1.1.2.1.2 | Remount /tmp to apply nodev"
          ansible.builtin.command: mount -o remount /tmp
          changed_when: false

    - name: "1.1.2.1.3 Ensure nosuid option set on /tmp partition (Automated)"
      block:
        - name: "1.1.2.1.3 | Remount /tmp to apply nosuid"
          ansible.builtin.command: mount -o remount /tmp
          changed_when: false

    - name: "1.1.2.1.4 Ensure noexec option set on /tmp partition (Automated)"
      block:
        - name: "1.1.2.1.4 | Remount /tmp to apply noexec"
          ansible.builtin.command: mount -o remount /tmp
          changed_when: false

    - name: "1.1.2.2.1 Ensure /dev/shm is a separate partition (Automated)"
      block:
        - name: "1.1.2.2.1 | Ensure /dev/shm entry exists in /etc/fstab (tmpfs)"
          ansible.builtin.lineinfile:
            path: /etc/fstab
            regexp: '^\s*tmpfs\s+/dev/shm\s+'
            line: "tmpfs /dev/shm tmpfs defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0"
            state: present
        - name: "1.1.2.2.1 | Remount /dev/shm"
          ansible.builtin.command: mount -o remount /dev/shm
          changed_when: false

    - name: "1.1.2.2.2 Ensure nodev option set on /dev/shm partition (Automated)"
      block:
        - name: "1.1.2.2.2 | Remount /dev/shm to apply nodev"
          ansible.builtin.command: mount -o remount /dev/shm
          changed_when: false

    - name: "1.1.2.2.3 Ensure nosuid option set on /dev/shm partition (Automated)"
      block:
        - name: "1.1.2.2.3 | Remount /dev/shm to apply nosuid"
          ansible.builtin.command: mount -o remount /dev/shm
          changed_when: false

    - name: "1.1.2.2.4 Ensure noexec option set on /dev/shm partition (Automated)"
      block:
        - name: "1.1.2.2.4 | Remount /dev/shm to apply noexec"
          ansible.builtin.command: mount -o remount /dev/shm
          changed_when: false

    - name: "1.1.2.4.2 Ensure nodev option set on /var partition (Automated)"
      block:
        - name: "1.1.2.4.2 | Ensure nodev option is set on /var in /etc/fstab"
          ansible.builtin.replace:
            path: /etc/fstab
            regexp: '^(\s*\S+\s+/var\s+\S+\s+)(?!(?:[^,\s]+,)*nodev(?:,[^,\s]+)*\s)(\S+)(\s+.*)$'
            replace: '\1\2,nodev\3'
        - name: "1.1.2.4.2 | Remount /var to apply nodev"
          ansible.builtin.command: mount -o remount /var
          changed_when: false

    - name: "1.1.2.5.3 Ensure nosuid option set on /var/tmp partition (Automated)"
      block:
        - name: "1.1.2.5.3 | Ensure nosuid is set on /var/tmp in /etc/fstab"
          ansible.builtin.replace:
            path: /etc/fstab
            regexp: '^(\s*\S+\s+/var/tmp\s+\S+\s+)(?!(?:[^,\s]+,)*nosuid(?:,[^,\s]+)*\s)(\S+)(\s+.*)$'
