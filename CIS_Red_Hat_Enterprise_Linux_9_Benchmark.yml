        - name: "2.1.2 | Stop and mask avahi-daemon.socket and avahi-daemon.service"
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
            masked: true
            enabled: false
          loop:
            - avahi-daemon.socket
            - avahi-daemon.service
          failed_when: false

