            replace: '\1\2,nodev\3'
        - name: "1.1.2.7.2 | Remount /var/log/audit to apply nodev"
          ansible.builtin.command: mount -o remount /var/log/audit
          changed_when: false

    - name: "1.1.2.7.3 Ensure nosuid option set on /var/log/audit partition (Automated)"
      block:
        - name: "1.1.2.7.3 | Ensure nosuid is set on /var/log/audit in /etc/fstab"
          ansible.builtin.replace:
            path: /etc/fstab
            regexp: '^(\s*\S+\s+/var/log/audit\s+\S+\s+)(?!(?:[^,\s]+,)*nosuid(?:,[^,\s]+)*\s)(\S+)(\s+.*)$'
            replace: '\1\2,nosuid\3'
        - name: "1.1.2.7.3 | Remount /var/log/audit to apply nosuid"
          ansible.builtin.command: mount -o remount /var/log/audit
