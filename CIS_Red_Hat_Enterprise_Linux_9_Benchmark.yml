    - name: "1.2.2.1 Ensure updates, patches, and additional security software are installed (Manual)"
      block:
        - name: "1.2.2.1 | Update all packages to latest version"
          ansible.builtin.dnf:
            name: "*"
            state: latest
            update_cache: true

    - name: "1.3.1.2 Ensure SELinux is not disabled in bootloader configuration (Automated)"
      block:
        - name: "1.3.1.2 | Remove selinux=0 and enforcing=0 from kernel arguments"
          ansible.builtin.command: >
            grubby --update-kernel ALL --remove-args "selinux=0 enforcing=0"
          changed_when: false

    - name: "1.3.1.3 Ensure SELinux policy is configured (Automated)"
      block:
        - name: "1.3.1.3 | Set SELINUXTYPE to targeted in /etc/selinux/config"
          ansible.builtin.lineinfile:
            path: /etc/selinux/config
            regexp: '^\s*SELINUXTYPE='
            line: "SELINUXTYPE=targeted"
            state: present

    - name: "1.3.1.4 Ensure the SELinux mode is not disabled (Automated)"
      block:
        - name: "1.3.1.4 | Set SELINUX=enforcing in /etc/selinux/config"
          ansible.builtin.lineinfile:
            path: /etc/selinux/config
            regexp: '^\s*SELINUX='
            line: "SELINUX=enforcing"
            state: present
        - name: "1.3.1.4 | Set SELinux to enforcing mode at runtime"
          ansible.builtin.command: setenforce 1
          changed_when: false
          failed_when: false

    - name: "1.3.1.7 Ensure the MCS Translation Service (mcstrans) is not installed (Automated)"
      block:
        - name: "1.3.1.7 | Remove mcstrans package"
          ansible.builtin.dnf:
            name: mcstrans
            state: absent

    - name: "1.3.1.8 Ensure SETroubleshoot is not installed (Automated)"
      block:
        - name: "1.3.1.8 | Remove setroubleshoot package"
          ansible.builtin.dnf:
            name: setroubleshoot
            state: absent

    - name: "1.5.2 Ensure ptrace_scope is restricted (Automated)"
      block:
        - name: "1.5.2 | Set kernel.yama.ptrace_scope = 1 in sysctl config"
          ansible.builtin.lineinfile:
            path: /etc/sysctl.d/60-kernel_sysctl.conf
            regexp: '^\s*kernel\.yama\.ptrace_scope\s*='
            line: "kernel.yama.ptrace_scope = 1"
            state: present
            create: true
            owner: root
            group: root
            mode: "0644"
        - name: "1.5.2 | Apply kernel.yama.ptrace_scope at runtime"
          ansible.posix.sysctl:
            name: kernel.yama.ptrace_scope
            value: "1"
            state: present
            reload: true

    - name: "1.5.3 Ensure core dump backtraces are disabled (Automated)"
      block:
        - name: "1.5.3 | Create coredump drop-in directory"
          ansible.builtin.file:
            path: /etc/systemd/coredump.conf.d
            state: directory
            owner: root
            group: root
            mode: "0755"
        - name: "1.5.3 | Set ProcessSizeMax=0 in coredump config"
          ansible.builtin.blockinfile:
            path: /etc/systemd/coredump.conf.d/60-coredump.conf
            create: true
            owner: root
            group: root
            mode: "0644"
            marker: "# {mark} CIS 1.5.3 - ProcessSizeMax"
            block: |
              [Coredump]
              ProcessSizeMax=0

    - name: "1.5.4 Ensure core dump storage is disabled (Automated)"
      block:
        - name: "1.5.4 | Set Storage=none in coredump config"
          ansible.builtin.blockinfile:
            path: /etc/systemd/coredump.conf.d/60-coredump.conf
            create: true
            owner: root
            group: root
            mode: "0644"
            marker: "# {mark} CIS 1.5.4 - Storage"
            block: |
              [Coredump]
              Storage=none

    - name: "1.6.1 Ensure system wide crypto policy is not set to legacy (Automated)"
      block:
        - name: "1.6.1 | Set system-wide crypto policy to DEFAULT"
          ansible.builtin.command: update-crypto-policies --set DEFAULT
          register: crypto_result
          changed_when: "'Setting system policy to DEFAULT' in crypto_result.stdout"
        - name: "1.6.1 | Apply updated crypto policies"
          ansible.builtin.command: update-crypto-policies
          changed_when: false

    - name: "2.1.1 Ensure autofs services are not in use (Automated)"
      block:
        - name: "2.1.1 | Remove autofs package"
          ansible.builtin.dnf:
            name: autofs
            state: absent
          ignore_errors: true
        - name: "2.1.1 | Stop and mask autofs.service if package is required"
          ansible.builtin.systemd:
            name: autofs.service
            state: stopped
            masked: true
            enabled: false
          failed_when: false

