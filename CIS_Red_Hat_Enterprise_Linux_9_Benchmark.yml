            state: absent

    - name: "1.1.1.4 Ensure hfsplus kernel module is not available (Automated)"
      block:
        - name: "1.1.1.4 | Disable hfsplus"
          ansible.builtin.copy:
            dest: /etc/modprobe.d/hfsplus.conf
