---
- name: CIS Red Hat Enterprise Linux 9 Benchmark
  hosts: all
  become: true
  tasks:
    - name: "1.1.1.1 Ensure cramfs kernel module is not available (Automated)"
      block:
        - name: "1.1.1.1 | Disable cramfs"
          ansible.builtin.copy:
            dest: /etc/modprobe.d/cramfs.conf
            content: |
              install cramfs /bin/false
              blacklist cramfs
            owner: root
            group: root
            mode: "0644"
        - name: "1.d.d.d | Unload cramfs"
          community.general.modprobe:
            name: cramfs
            state: absent

    - name: "1.1.1.2 Ensure freevxfs kernel module is not available (Automated)"
      block:
        - name: "1.1.1.2 | Disable freevxfs"
          ansible.builtin.copy:
            dest: /etc/modprobe.d/freevxfs.conf
            content: |
              install freevxfs /bin/false
              blacklist freevxfs
            owner: root
            group: root
            mode: "0644"
        - name: "1.1.1.2 | Unload freevxfs"
          community.general.modprobe:
            name: freevxfs
            state: absent

    - name: "1.1.1.3 Ensure hfs kernel module is not available (Automated)"
      block:
        - name: "1.1.1.3 | Disable hfs"
          ansible.builtin.copy:
            dest: /etc/modprobe.d/hfs.conf
            content: |
              install hfs /bin/false
              blacklist hfs
            owner: root
            group: root
            mode: "0644"
        - name: "1.1.1.3 | Unload hfs"
          community.general.modprobe:
