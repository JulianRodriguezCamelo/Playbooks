          [6.2.9] UID 0 accounts      : {{ cis_6_2_9_uid_zero.stdout_lines | join(', ') }}
          [6.2.11] Dot files check    : {{ 'FAIL' if cis_6_2_11_dot_files.stdout != "" else 'PASS' }}
          ================================================================
      tags: ["report"]

    - name: "REPORT | Confirmar ubicación del reporte"
      ansible.builtin.debug:
        msg: "Reporte de cumplimiento generado en: {{ report_path }}"
      tags: ["report"]

  handlers:
    - name: restart postfix
      ansible.builtin.service:
        name: postfix
        state: restarted
    - name: reload sshd
      ansible.builtin.service:
        name: sshd
        state: reloaded
    - name: restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
    - name: restart auditd
      ansible.builtin.service:
        name: auditd
        state: restarted
    - name: update grub
      ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
