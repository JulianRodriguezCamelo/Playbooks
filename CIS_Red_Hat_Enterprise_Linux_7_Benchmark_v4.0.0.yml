          [4.5.1] login.defs SHA512   : {{ cis_4_5_1_method.stdout | default('N/A') }}
          [4.5.2.3] Sys accounts lock : {{ 'OK' if cis_4_5_2_3_sys_accounts.stdout == "" else 'LOCKED ' ~ cis_4_5_2_3_sys_accounts.stdout }}
          [5.1]   Journald Comp/Pers  : {{ cis_5_1_journald.stdout | default('N/A') }}
          [5.2.1.2] Audit Backlog     : {{ cis_5_2_1_2_backlog.stdout | default('N/A') }}
