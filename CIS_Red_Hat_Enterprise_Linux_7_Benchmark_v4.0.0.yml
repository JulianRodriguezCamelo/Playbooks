          [5.2.2.3] Audit Halt        : {{ cis_5_2_2_3_halt.stdout | default('N/A') }}
          [5.4.1] pam_cracklib        : {{ cis_5_4_1_pwauth.stdout | default('N/A') }}
          [5.5.5] umask restringido   : {{ cis_5_5_5_restrictive.stdout | default('N/A') }}
          [5.7]   su Access restricted: {{ cis_5_7_pam.stdout | default('N/A') }}
          [6.1.1] /etc/passwd perms   : {{ cis_6_1_1_stat.stat.mode | default('N/A') }}
          [6.1.10] opasswd perms      : {{ cis_6_1_10_opasswd.stat.mode | default('N/A') }}
          [6.1.11] World Writable     : {{ 'NONE' if cis_6_1_11_world_writable.stdout == "" else 'FOUND' }}
          [6.2.1] Unshadowed accounts : {{ cis_6_2_1_unshadowed.stdout | default('NONE (OK)') or 'NONE (OK)' }}
