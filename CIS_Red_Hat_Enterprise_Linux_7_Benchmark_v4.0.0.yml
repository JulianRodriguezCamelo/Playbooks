          [3.3.8] TCP SYN Cookies     : {{ cis_3_3_8_runtime.stdout | default('N/A') }}
          [4.1.8] Cron/At restricted  : {{ 'YES' if not cis_4_1_8_stats.results[0].stat.exists else 'NO (REMEDIATED)' }}
