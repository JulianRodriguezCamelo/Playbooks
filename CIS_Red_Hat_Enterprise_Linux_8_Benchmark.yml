      changed_when: false
      tags:
        - cis_6.2.1.2.2
        - journald
        - logging
        - audit

    - name: "CIS 6.2.1.2.2 | Advertir si journal-upload.conf no está completamente configurado"
      ansible.builtin.debug:
        msg: >
          ADVERTENCIA (Manual): Configure /etc/systemd/journal-upload.conf con:
          URL, ServerKeyFile, ServerCertificateFile y TrustedCertificateFile
          según su entorno. Estado actual: {{ journal_upload_check.stdout | default('No configurado') }}
      when: journal_upload_check.stdout | length == 0 or
        ('URL=' not in journal_upload_check.stdout) or
        ('ServerKeyFile=' not in journal_upload_check.stdout)
      tags:
        - cis_6.2.1.2.2
        - journald
        - logging
        - audit

    # =========================================================================
    # SECCIÓN 6.2.2 - rsyslog / logrotate
    # =========================================================================

    # -------------------------------------------------------------------------
    # CIS 6.2.2.4 - Ensure rsyslog log file creation mode is configured
    # -------------------------------------------------------------------------
    - name: "CIS 6.2.2.4 | Verificar si rsyslog está instalado"
      ansible.builtin.command:
        cmd: rpm -q rsyslog
      register: rsyslog_installed
      changed_when: false
      failed_when: false
      tags:
        - cis_6.2.2.4
        - rsyslog
        - logging

    - name: "CIS 6.2.2.4 | Configurar $FileCreateMode 0640 en rsyslog"
      ansible.builtin.lineinfile:
        path: /etc/rsyslog.conf
        regexp: '^\s*\$FileCreateMode\s+'
        line: "$FileCreateMode 0640"
        state: present
        backup: true
      when: rsyslog_installed.rc == 0
      notify: Restart rsyslog
      tags:
        - cis_6.2.2.4
        - rsyslog
        - logging

    - name: "CIS 6.2.2.4 | Verificar $FileCreateMode en rsyslog"
      ansible.builtin.shell:
        cmd: >
          grep -Ps '^\h*\$FileCreateMode\h+0[0,2,4,6][0,2,4]0\b'
          /etc/rsyslog.conf /etc/rsyslog.d/*.conf 2>/dev/null || true
      register: rsyslog_filemode_check
      changed_when: false
      when: rsyslog_installed.rc == 0
      tags:
        - cis_6.2.2.4
        - rsyslog
        - logging
        - audit

    - name: "CIS 6.2.2.4 | Mostrar FileCreateMode configurado en rsyslog"
      ansible.builtin.debug:
        msg: "rsyslog FileCreateMode: {{ rsyslog_filemode_check.stdout | default('rsyslog no instalado') }}"
      tags:
        - cis_6.2.2.4
        - rsyslog
        - logging
        - audit

    # -------------------------------------------------------------------------
    # CIS 6.2.2.8 - Ensure logrotate is configured (Manual - auditoría)
    # -------------------------------------------------------------------------
    - name: "CIS 6.2.2.8 | Verificar que logrotate está instalado"
      ansible.builtin.command:
        cmd: rpm -q logrotate
      register: logrotate_installed
      changed_when: false
      failed_when: false
      tags:
        - cis_6.2.2.8
        - logrotate
        - logging
        - audit

    - name: "CIS 6.2.2.8 | Verificar existencia de configuración de logrotate"
      ansible.builtin.shell:
        cmd: "ls /etc/logrotate.conf /etc/logrotate.d/ 2>/dev/null || true"
      register: logrotate_conf_check
      changed_when: false
      tags:
        - cis_6.2.2.8
        - logrotate
        - logging
        - audit

    - name: "CIS 6.2.2.8 | Advertir revisión manual de logrotate"
      ansible.builtin.debug:
        msg: >
          MANUAL: Revise /etc/logrotate.conf y /etc/logrotate.d/* para
          asegurarse de que la rotación de logs cumple con la política del sitio.
          Archivos encontrados: {{ logrotate_conf_check.stdout_lines }}
      tags:
        - cis_6.2.2.8
        - logrotate
        - logging
        - audit

    # =========================================================================
    # SECCIÓN 6.2.3.1 - Acceso a archivos de log en /var/log
    # =========================================================================

    - name: "CIS 6.2.3.1 | Corregir permisos excesivos en archivos de /var/log (genérico)"
      ansible.builtin.shell:
        cmd: |
          find -L /var/log -type f \( -perm /0137 -o ! -user root -o ! -group root \) \
          2>/dev/null | while IFS= read -r l_file; do
            fname="$(basename "$l_file")"
            case "$fname" in
              lastlog|lastlog.*|wtmp|wtmp.*|wtmp-*|btmp|btmp.*|btmp-*|README)
                chmod ug-x,o-wx "$l_file" ;;
              secure*|auth.log|syslog|messages)
                chown root:root "$l_file"
                chmod u-x,g-wx,o-rwx "$l_file" ;;
              *.journal|*.journal~)
                chown root:root "$l_file"
                chmod u-x,g-wx,o-rwx "$l_file" ;;
              *)
                chmod u-x,g-wx,o-rwx "$l_file" ;;
            esac
          done
      changed_when: true
      failed_when: false
      tags:
        - cis_6.2.3.1
        - logging
        - logfiles

    - name: "CIS 6.2.3.1 | Verificar archivos con permisos excesivos en /var/log"
      ansible.builtin.shell:
        cmd: >
          find -L /var/log -type f \( -perm /0137 -o ! -user root -o ! -group root \)
          2>/dev/null | head -20 || true
      register: varlog_perms_check
      changed_when: false
      tags:
        - cis_6.2.3.1
        - logging
        - logfiles
        - audit

    - name: "CIS 6.2.3.1 | Mostrar resultado de auditoría de /var/log"
      ansible.builtin.debug:
        msg: >
          {{ 'OK: Todos los archivos en /var/log tienen permisos apropiados'
          if varlog_perms_check.stdout | length == 0
          else 'REVISAR: Archivos con permisos incorrectos: ' + varlog_perms_check.stdout }}
      tags:
        - cis_6.2.3.1
        - logging
        - logfiles
        - audit

    # =========================================================================
    # SECCIÓN 7.1 - Permisos en archivos críticos del sistema
    # =========================================================================

    - name: "CIS 7.1.1-7.1.4,7.1.9 | Configurar permisos 0644 root:root en archivos de usuario/grupo"
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - /etc/passwd
        - /etc/passwd-
        - /etc/group
        - /etc/group-
        - /etc/shells
      failed_when: false
      tags:
        - cis_7.1.1
        - cis_7.1.2
        - cis_7.1.3
        - cis_7.1.4
        - cis_7.1.9
        - file_permissions

    - name: "CIS 7.1.5-7.1.8 | Configurar permisos 0000 root:root en archivos shadow/gshadow"
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: root
        mode: "0000"
      loop:
        - /etc/shadow
        - /etc/shadow-
        - /etc/gshadow
        - /etc/gshadow-
      failed_when: false
      tags:
        - cis_7.1.5
        - cis_7.1.6
        - cis_7.1.7
        - cis_7.1.8
        - file_permissions

    - name: "CIS 7.1.1-7.1.9 | Verificar permisos en archivos críticos del sistema"
      ansible.builtin.shell:
        cmd: >
          for f in /etc/passwd /etc/passwd- /etc/group /etc/group-
          /etc/shadow /etc/shadow- /etc/gshadow /etc/gshadow- /etc/shells; do
            [ -f "$f" ] && stat -Lc "%-20n  modo:%#a  propietario:%U  grupo:%G" "$f"
          done
      register: critical_files_check
      changed_when: false
      tags:
        - cis_7.1.1
        - cis_7.1.2
        - cis_7.1.3
        - cis_7.1.4
        - cis_7.1.5
        - cis_7.1.6
        - cis_7.1.7
        - cis_7.1.8
        - cis_7.1.9
        - file_permissions
        - audit

    - name: "CIS 7.1.1-7.1.9 | Mostrar permisos de archivos críticos"
      ansible.builtin.debug:
        msg: "{{ critical_files_check.stdout_lines }}"
      tags:
        - cis_7.1.1
        - cis_7.1.9
        - file_permissions
        - audit

    # -------------------------------------------------------------------------
    # CIS 7.1.11 - Ensure world writable files and directories are secured
    # -------------------------------------------------------------------------
    - name: "CIS 7.1.11 | Eliminar permiso de escritura para 'other' en archivos world-writable"
      ansible.builtin.shell:
        cmd: |
          findmnt -Dkerno fstype,target | \
          awk '($1 !~ /^\s*(nfs|proc|cifs|smb|vfat|iso9660|efivarfs|selinuxfs|ncpfs)/ && \
               $2 !~ /^(\/run|\/tmp|\/var\/tmp)(\/|$)/){print $2}' | \
          while IFS= read -r l_mount; do
            find "$l_mount" -mount -xdev \
              \( -path "*/containers/storage/*" -o -path "*/containerd/*" -o \
                 -path "*/kubelet/*" -o -path "/sys/*" -o -path "/snap/*" -o \
                 -path "/boot/efi/*" \) -prune -o \
              -type f -perm -0002 -print0 2>/dev/null
          done | xargs -0 -I{} chmod o-w "{}" 2>/dev/null || true
      changed_when: true
      failed_when: false
      tags:
        - cis_7.1.11
        - file_permissions
        - world_writable

    - name: "CIS 7.1.11 | Agregar sticky bit a directorios world-writable sin sticky bit"
      ansible.builtin.shell:
        cmd: |
          findmnt -Dkerno fstype,target | \
          awk '($1 !~ /^\s*(nfs|proc|cifs|smb|vfat|iso9660|efivarfs|selinuxfs|ncpfs)/ && \
               $2 !~ /^(\/run|\/tmp|\/var\/tmp)(\/|$)/){print $2}' | \
          while IFS= read -r l_mount; do
            find "$l_mount" -mount -xdev \
              \( -path "*/containers/storage/*" -o -path "*/containerd/*" -o \
                 -path "*/kubelet/*" -o -path "/sys/*" -o -path "/snap/*" -o \
                 -path "/boot/efi/*" \) -prune -o \
              -type d -perm -0002 ! -perm -01000 -print0 2>/dev/null
          done | xargs -0 -I{} chmod a+t "{}" 2>/dev/null || true
      changed_when: true
      failed_when: false
      tags:
        - cis_7.1.11
        - file_permissions
        - world_writable

    - name: "CIS 7.1.11 | Verificar archivos world-writable restantes"
      ansible.builtin.shell:
        cmd: |
          findmnt -Dkerno fstype,target | \
          awk '($1 !~ /^\s*(nfs|proc|cifs|smb|vfat|iso9660|efivarfs|selinuxfs|ncpfs)/ && \
               $2 !~ /^(\/run|\/tmp|\/var\/tmp)(\/|$)/){print $2}' | \
          while IFS= read -r l_mount; do
            find "$l_mount" -mount -xdev -type f -perm -0002 2>/dev/null | head -10
          done || true
      register: ww_files_check
      changed_when: false
      tags:
        - cis_7.1.11
        - file_permissions
        - world_writable
        - audit

    - name: "CIS 7.1.11 | Mostrar resultado de auditoría world-writable"
      ansible.builtin.debug:
        msg: >
          {{ 'OK: No existen archivos world-writable en el filesystem local'
          if ww_files_check.stdout | length == 0
          else 'REVISAR archivos world-writable: ' + ww_files_check.stdout }}
      tags:
        - cis_7.1.11
        - file_permissions
        - audit

    # -------------------------------------------------------------------------
    # CIS 7.1.12 - Ensure no files or directories without an owner and group
    # -------------------------------------------------------------------------
    - name: "CIS 7.1.12 | Buscar archivos y directorios sin propietario o grupo"
      ansible.builtin.shell:
        cmd: |
          findmnt -Dkerno fstype,target | \
          awk '($1 !~ /^\s*(nfs|proc|cifs|smb|vfat|iso9660|efivarfs|selinuxfs|ncpfs)/ && \
               $2 !~ /^(\/run|\/tmp|\/var\/tmp)(\/|$)/){print $2}' | \
          while IFS= read -r l_mount; do
            find "$l_mount" -mount -xdev \
              \( -path "*/containers/storage/*" -o -path "*/containerd/*" -o \
                 -path "*/kubelet/*" -o -path "/sys/*" -o -path "/snap/*" -o \
                 -path "/boot/efi/*" \) -prune -o \
              \( -type f -o -type d \) \( -nouser -o -nogroup \) -print 2>/dev/null | head -20
          done || true
      register: unowned_files_check
      changed_when: false
      tags:
        - cis_7.1.12
        - file_permissions
        - audit

    - name: "CIS 7.1.12 | Mostrar resultado de auditoría de archivos sin propietario"
      ansible.builtin.debug:
        msg: >
          {{ 'OK: No existen archivos sin propietario o grupo en el filesystem local'
          if unowned_files_check.stdout | length == 0
          else 'ACCIÓN REQUERIDA - Archivos sin propietario/grupo encontrados: ' + unowned_files_check.stdout }}
      tags:
        - cis_7.1.12
        - file_permissions
        - audit

    - name: "CIS 7.1.12 | Fallar si existen archivos sin propietario o grupo"
      ansible.builtin.fail:
        msg: >
          FALLO CIS 7.1.12: Se encontraron archivos sin propietario o grupo.
          Revise y asigne propietario activo a: {{ unowned_files_check.stdout }}
      when: unowned_files_check.stdout | length > 0
      tags:
        - cis_7.1.12
        - file_permissions
        - audit

    # -------------------------------------------------------------------------
    # Reboot si SELinux estaba deshabilitado
    # -------------------------------------------------------------------------
    - name: "Reiniciar si SELinux estaba deshabilitado (autorelabel requerido)"
      ansible.builtin.reboot:
        msg: "Reiniciando para habilitar SELinux y re-etiquetar el filesystem (CIS 1.3.1.4)"
        reboot_timeout: 600
        pre_reboot_delay: 10
        post_reboot_delay: 30
      when:
        - selinux_runtime_mode.stdout | lower == "disabled"
        - reboot_after_enable | bool
      tags:
        - cis_1.3.1.4
        - selinux_mode
        - reboot

      # -------------------------------------------------------------------------
    # CIS 7.2.2 - Ensure /etc/shadow password fields are not empty
    # -------------------------------------------------------------------------
    - name: "CIS 7.2.2 | Buscar cuentas con password vacío en /etc/shadow"
  ansible.builtin.shell:
    cmd: >
      awk -F: '($2 == "" ) { print $1 " does not have a password "}' /etc/shadow
  register: shadow_empty_pass
  changed_when: false
  tags:
    - cis_7.2.2
    - authentication
    - shadow
    - audit

    - name: "CIS 7.2.2 | Mostrar resultado auditoría password vacío"
      ansible.builtin.debug:
        msg: >
          {{ 'OK: Todas las cuentas tienen password configurado o están bloqueadas'
          if shadow_empty_pass.stdout | length == 0
          else 'ACCIÓN REQUERIDA - Cuentas sin password: ' + shadow_empty_pass.stdout }}
      tags:
        - cis_7.2.2
        - audit

    - name: "CIS 7.2.2 | Fallar si existen cuentas sin password"
      ansible.builtin.fail:
        msg: >
          FALLO CIS 7.2.2: Se encontraron cuentas con campo password vacío:
          {{ shadow_empty_pass.stdout }}
      when: shadow_empty_pass.stdout | length > 0
      tags:
        - cis_7.2.2
        - audit

    # -------------------------------------------------------------------------
    # CIS 7.2.3 - Ensure all groups in /etc/passwd exist in /etc/group
    # -------------------------------------------------------------------------
    - name: "CIS 7.2.3 | Verificar GIDs definidos en /etc/passwd sin grupo válido"
      ansible.builtin.shell:
        cmd: |
          awk -F: '{print $4}' /etc/passwd | sort -u > /tmp/passwd_gids
          awk -F: '{print $3}' /etc/group | sort -u > /tmp/group_gids
          comm -23 /tmp/passwd_gids /tmp/group_gids
      register: gid_mismatch
      changed_when: false
      tags:
        - cis_7.2.3
        - group_integrity
        - audit

    - name: "CIS 7.2.3 | Mostrar resultado auditoría GIDs inconsistentes"
      ansible.builtin.debug:
        msg: >
          {{ 'OK: Todos los GIDs en /etc/passwd existen en /etc/group'
          if gid_mismatch.stdout | length == 0
          else 'ACCIÓN REQUERIDA - GIDs sin grupo asociado: ' + gid_mismatch.stdout }}
      tags:
        - cis_7.2.3
        - audit

    - name: "CIS 7.2.3 | Fallar si existen GIDs inconsistentes"
      ansible.builtin.fail:
        msg: >
          FALLO CIS 7.2.3: Existen GIDs definidos en /etc/passwd que no existen en /etc/group:
          {{ gid_mismatch.stdout }}
      when: gid_mismatch.stdout | length > 0
      tags:
        - cis_7.2.3
        - audit

    # -------------------------------------------------------------------------
    # CIS 7.2.8 - Ensure local interactive user home directories are configured
    # -------------------------------------------------------------------------
    - name: "CIS 7.2.8 | Verificar directorios home de usuarios interactivos"
      ansible.builtin.shell:
        cmd: |
          valid_shells=$(awk -F/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\//p' | paste -sd '|')
          awk -F: -v pat="^(${valid_shells})$" '$(NF) ~ pat {print $1":"$(NF-1)}' /etc/passwd | while IFS=: read -r user home; do
            if [ ! -d "$home" ]; then
              echo "User $user - Home directory $home does not exist"
            else
              owner=$(stat -Lc '%U' "$home")
              mode=$(stat -Lc '%a' "$home")
              if [ "$owner" != "$user" ]; then
                echo "User $user - Home owned by $owner"
              fi
              if [ "$mode" -gt 750 ]; then
                echo "User $user - Home permissions $mode too permissive"
              fi
            fi
          done
      register: home_check
      changed_when: false
      tags:
        - cis_7.2.8
        - home_directories
        - audit

    - name: "CIS 7.2.8 | Mostrar resultado auditoría home directories"
      ansible.builtin.debug:
        msg: >
          {{ 'OK: Directorios home correctamente configurados'
          if home_check.stdout | length == 0
          else 'ACCIÓN REQUERIDA - Problemas detectados en home directories: ' + home_check.stdout }}
      tags:
        - cis_7.2.8
        - audit

    - name: "CIS 7.2.8 | Fallar si existen problemas en home directories"
      ansible.builtin.fail:
        msg: >
          FALLO CIS 7.2.8: Se detectaron problemas en directorios home:
          {{ home_check.stdout }}
      when: home_check.stdout | length > 0
      tags:
        - cis_7.2.8
        - audit
  # ---------------------------------------------------------------------------
  # HANDLERS
  # ---------------------------------------------------------------------------
  handlers:
    - name: Restart rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        state: restarted
      listen: "Restart rsyslog"

    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
      listen: "Restart journald"

    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
      listen: "Restart sshd"

    - name: Reload sysctl
      ansible.builtin.command:
        cmd: sysctl --system
      listen: "Reload sysctl"

    - name: Restart firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: restarted
      listen: "Restart firewalld"

    - name: Remount /tmp
      ansible.builtin.command:
        cmd: mount -o remount /tmp
      listen: "Remount /tmp"

    - name: Remount /dev/shm
      ansible.builtin.command:
        cmd: mount -o remount /dev/shm
      listen: "Remount /dev/shm"

    - name: Aviso reinicio SELinux
      ansible.builtin.debug:
        msg: >
          AVISO: Se modificó la política SELinux. Puede requerirse reinicio.
          Use 'reboot_after_enable: true' para reinicio automático.

