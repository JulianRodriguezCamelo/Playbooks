          - "CIS 5.2.1     - sudo instalado:                     OK"
          - "CIS 5.2.2     - sudo usa pty:                       OK"
          - "CIS 5.2.5     - re-autenticación sudo:              OK"
          - "CIS 5.2.6     - sudo timeout={{ sudo_timestamp_timeout }}m:              OK"
          - "CIS 5.2.7     - su restringido a {{ su_restrict_group }}:      OK"
