        state: present
      tags:
        - cis_6.2.1.2.1
        - journald
        - logging

    - name: "CIS 6.2.1.2.1 | Verificar que systemd-journal-remote está instalado"
      ansible.builtin.command:
        cmd: rpm -q systemd-journal-remote
      register: journal_remote_check
      changed_when: false
      failed_when: journal_remote_check.rc != 0
      tags:
        - cis_6.2.1.2.1
        - journald
        - logging
        - audit

    - name: "CIS 6.2.1.2.1 | Mostrar versión de systemd-journal-remote"
      ansible.builtin.debug:
        msg: "{{ journal_remote_check.stdout }}"
      tags:
        - cis_6.2.1.2.1
        - journald
        - logging
        - audit

    # -------------------------------------------------------------------------
    # CIS 6.2.1.2.2 - Ensure systemd-journal-remote authentication is configured
    # -------------------------------------------------------------------------
    - name: "CIS 6.2.1.2.2 | Verificar configuración de autenticación en journal-upload.conf"
      ansible.builtin.shell:
