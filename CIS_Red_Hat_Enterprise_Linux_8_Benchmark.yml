          - "CIS 1.1.2.2.4 - noexec en /dev/shm:                 OK"
          - "CIS 1.3.1.1   - libselinux instalado:               OK"
          - "CIS 1.3.1.2   - Bootloader sin selinux=0:           OK"
          - "CIS 1.3.1.3   - SELINUXTYPE = {{ selinux_policy }}:  OK"
